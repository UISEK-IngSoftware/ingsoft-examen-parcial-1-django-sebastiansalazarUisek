<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Peliculas</title>
</head>

<body>
    <div class="container">
        <div class="text-center my-4">
            <h1 class="fw-bold">🎬 Películas favoritas</h1>
            <hr style="width: 200px; margin: auto;">
        </div>

        <div class="row mt-3">
            {% for movie in movies %}
            <div class="col-sm-3 mb-4 d-flex align-items-stretch">
                <div class="card h-80" style="width: 18rem;">
                    <img src="{{ movie.picture.url }}" class="card-img-top" style="height: 350px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ movie.title|capfirst }} - {{ movie.year }}</h5>
                        <p class="card-text">{{ movie.synopsis }}</p>
                        <a href="{% url 'movie_details' movie.id %}" class="btn btn-dark mt-auto">Ver detalles</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

</body>

</html>
